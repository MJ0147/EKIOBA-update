name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r store/requirements.txt

      - name: Run Django tests
        working-directory: store
        env:
          DJANGO_DB_ENGINE: sqlite
        run: |
          python manage.py test --settings=store_service.settings_test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Inject environment
        run: |
          echo "NEXT_PUBLIC_BACKEND_URL=${{ secrets.BACKEND_URL_PROD }}" >> frontend/.env.production

      - name: Install and build Next.js frontend
        run: |
          if [ ! -f frontend/package.json ]; then
            echo "frontend/package.json not found, skipping Next.js build."
            exit 0
          fi
          cd frontend
          npm install
          npm run build

