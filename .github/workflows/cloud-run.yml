name: Cloud Run CD

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Enable required APIs
        run: |
          gcloud services enable run.googleapis.com cloudbuild.googleapis.com secretmanager.googleapis.com

      - name: Deploy backend services
        run: |
          # Build Images for all services to avoid "resource is empty" errors
          gcloud builds submit ./store --tag "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/ekioba/ekioba-store"
          gcloud builds submit ./cargo --tag "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/ekioba/ekioba-cargo"
          gcloud builds submit ./hotels --tag "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/ekioba/ekioba-hotels"
          gcloud builds submit ./language_academy --tag "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/ekioba/ekioba-language-academy"
          gcloud builds submit ./ai_assistant --tag "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/ekioba/ekioba-ai-assistant"
          
          gcloud run deploy ekioba-store \
            --image "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/ekioba/ekioba-store" \
            --region "${GCP_REGION}" \
            --project "${GCP_PROJECT_ID}" \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets "DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,COCKROACHDB_URL=COCKROACHDB_STORE_URL:latest,SOLANA_RPC_URL=SOLANA_RPC_URL:latest,TON_API_KEY=TON_API_KEY:latest"

          gcloud run deploy ekioba-cargo \
            --image "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/ekioba/ekioba-cargo" \
            --region "${GCP_REGION}" \
            --project "${GCP_PROJECT_ID}" \
            --platform managed \
            --allow-unauthenticated

          gcloud run deploy ekioba-hotels \
            --image "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/ekioba/ekioba-hotels" \
            --region "${GCP_REGION}" \
            --project "${GCP_PROJECT_ID}" \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets "DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,COCKROACHDB_URL=COCKROACHDB_HOTELS_URL:latest"

          gcloud run deploy ekioba-language-academy \
            --image "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/ekioba/ekioba-language-academy" \
            --region "${GCP_REGION}" \
            --project "${GCP_PROJECT_ID}" \
            --platform managed \
            --allow-unauthenticated

          gcloud run deploy ekioba-ai-assistant \
            --image "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/ekioba/ekioba-ai-assistant" \
            --region "${GCP_REGION}" \
            --project "${GCP_PROJECT_ID}" \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets "TON_API_KEY=TON_API_KEY:latest"

      - name: Capture Backend URLs
        id: backend-urls
        run: |
          IYOBO_URL=$(gcloud run services describe ekioba-ai-assistant --region "${GCP_REGION}" --format='value(status.url)')
          STORE_URL=$(gcloud run services describe ekioba-store --region "${GCP_REGION}" --format='value(status.url)')
          echo "iyobo_chat_url=${IYOBO_URL}/chat" >> "$GITHUB_OUTPUT"
          echo "store_api_url=${STORE_URL}/api/products/" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend
        run: |
          gcloud run deploy ekioba-frontend \
            --source ./frontend \
            --region "${GCP_REGION}" \
            --project "${GCP_PROJECT_ID}" \
            --platform managed \
            --allow-unauthenticated \
            --set-build-env-vars "NEXT_PUBLIC_IYOBO_URL=${{ steps.backend-urls.outputs.iyobo_chat_url }},NEXT_PUBLIC_STORE_PRODUCTS_URL=${{ steps.backend-urls.outputs.store_api_url }}"
